name: Backend CI

on:
  push:
    paths:
      - 'backend/**'
      - '.github/workflows/backend-ci.yml'
  pull_request:
    paths:
      - 'backend/**'
      - '.github/workflows/backend-ci.yml'

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore FelloWay.slnx

      - name: Build
        run: dotnet build FelloWay.slnx --no-restore -c Release

      - name: Test (fast suite)
        run: dotnet test FelloWay.slnx --no-build -c Release --verbosity normal --filter "Category!=Integration"

  integration:
    runs-on: ubuntu-latest
    needs: build
    defaults:
      run:
        working-directory: backend

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore FelloWay.slnx

      - name: Build
        run: dotnet build FelloWay.slnx --no-restore -c Release

      - name: Test (integration suite)
        env:
          FELLOWAY_TEST_CONNECTION: Host=localhost;Port=5432;Database=postgres;Username=postgres;Password=postgres
        run: dotnet test FelloWay.slnx --no-build -c Release --verbosity normal --filter "Category=Integration"
