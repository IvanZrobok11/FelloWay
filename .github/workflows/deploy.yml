name: Deploy (main → dev)

on:
  push:
    branches: [main]

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ${{ vars.AWS_REGION || 'eu-central-1' }}
  PROJECT_NAME: felloway
  ENVIRONMENT: dev

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ github.sha }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Backend tests
        continue-on-error: true
        working-directory: backend
        run: dotnet test FelloWay.slnx --filter "Category!=Integration" --verbosity normal

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Flutter tests
        continue-on-error: true
        working-directory: frontend
        run: |
          flutter pub get
          flutter test

      - name: Resolve deploy URLs
        id: urls
        run: |
          if [ -n "${{ vars.DEV_API_BASE_URL }}" ]; then
            echo "api_base=${{ vars.DEV_API_BASE_URL }}" >> "$GITHUB_OUTPUT"
          elif [ -n "${{ vars.DOMAIN_NAME }}" ]; then
            echo "api_base=https://dev.api.${{ vars.DOMAIN_NAME }}" >> "$GITHUB_OUTPUT"
          else
            echo "Set GitHub variable DEV_API_BASE_URL (from: terraform output -raw api_url)"
            exit 1
          fi
          if [ -n "${{ vars.DEV_WEB_BASE_URL }}" ]; then
            echo "web_base=${{ vars.DEV_WEB_BASE_URL }}" >> "$GITHUB_OUTPUT"
          elif [ -n "${{ vars.DOMAIN_NAME }}" ]; then
            echo "web_base=https://dev.app.${{ vars.DOMAIN_NAME }}" >> "$GITHUB_OUTPUT"
          else
            echo "Set GitHub variable DEV_WEB_BASE_URL (from: terraform output -raw web_url)"
            exit 1
          fi

      - name: Build web (dev)
        working-directory: frontend
        env:
          API_BASE_URL: ${{ steps.urls.outputs.api_base }}
          STREAM_API_KEY: ${{ vars.DEV_STREAM_API_KEY }}
        run: |
          DART_DEFINES=(
            --dart-define=API_MODE=live
            --dart-define=API_BASE_URL="$API_BASE_URL"
          )
          if [ -n "$STREAM_API_KEY" ]; then
            DART_DEFINES+=(--dart-define=STREAM_API_KEY="$STREAM_API_KEY")
          else
            echo "::warning::DEV_STREAM_API_KEY not set — GetStream chat disabled in this build"
          fi
          flutter build web --release "${DART_DEFINES[@]}"

      - name: Upload web artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-build
          path: frontend/build/web
          retention-days: 7

      - name: Write deploy metadata
        run: echo '{"image_tag":"${{ github.sha }}","environment":"dev"}' > deploy-metadata.json

      - name: Upload deploy metadata
        uses: actions/upload-artifact@v4
        with:
          name: deploy-metadata
          path: deploy-metadata.json
          retention-days: 7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build API image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: false
          tags: felloway-api:${{ github.sha }}
          load: true

      - name: Save docker image
        run: docker save felloway-api:${{ github.sha }} -o felloway-api-image.tar

      - name: Upload docker image
        uses: actions/upload-artifact@v4
        with:
          name: docker-image
          path: felloway-api-image.tar
          retention-days: 1

  deploy-dev:
    needs: build
    runs-on: ubuntu-latest
    environment: dev
    steps:
      - uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: docker-image

      - name: Download web artifact
        uses: actions/download-artifact@v4
        with:
          name: web-build
          path: web-build

      - name: Load docker image
        run: docker load -i felloway-api-image.tar

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ vars.AWS_ACCOUNT_ID }}:role/${{ env.PROJECT_NAME }}-github-deploy-${{ env.ENVIRONMENT }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Push image to ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ needs.build.outputs.image_tag }}
        run: |
          docker tag felloway-api:$IMAGE_TAG $ECR_REGISTRY/${{ env.PROJECT_NAME }}-api-${{ env.ENVIRONMENT }}:$IMAGE_TAG
          docker push $ECR_REGISTRY/${{ env.PROJECT_NAME }}-api-${{ env.ENVIRONMENT }}:$IMAGE_TAG
          docker tag felloway-api:$IMAGE_TAG $ECR_REGISTRY/${{ env.PROJECT_NAME }}-api-${{ env.ENVIRONMENT }}:latest
          docker push $ECR_REGISTRY/${{ env.PROJECT_NAME }}-api-${{ env.ENVIRONMENT }}:latest

      - name: Deploy ECS service (new task definition with API image)
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ needs.build.outputs.image_tag }}
        run: |
          chmod +x .github/scripts/ecs-deploy-api-image.sh
          IMAGE_URI="$ECR_REGISTRY/${{ env.PROJECT_NAME }}-api-${{ env.ENVIRONMENT }}:$IMAGE_TAG"
          .github/scripts/ecs-deploy-api-image.sh \
            "${{ env.PROJECT_NAME }}-${{ env.ENVIRONMENT }}" \
            "${{ env.PROJECT_NAME }}-api-${{ env.ENVIRONMENT }}" \
            "${{ env.PROJECT_NAME }}-api-${{ env.ENVIRONMENT }}" \
            "$IMAGE_URI"

      - name: Sync web to S3
        env:
          BUCKET: ${{ env.PROJECT_NAME }}-web-${{ env.ENVIRONMENT }}-${{ vars.AWS_ACCOUNT_ID }}
        run: aws s3 sync web-build/ s3://$BUCKET/ --delete

      - name: Invalidate CloudFront
        env:
          DISTRIBUTION_ID: ${{ vars.DEV_CLOUDFRONT_DISTRIBUTION_ID }}
        run: |
          if [ -n "$DISTRIBUTION_ID" ]; then
            aws cloudfront create-invalidation --distribution-id "$DISTRIBUTION_ID" --paths "/*"
          fi

      - name: Resolve deploy URLs
        id: urls
        env:
          DISTRIBUTION_ID: ${{ vars.DEV_CLOUDFRONT_DISTRIBUTION_ID }}
        run: |
          if [ -n "${{ vars.DEV_API_BASE_URL }}" ]; then
            echo "api_base=${{ vars.DEV_API_BASE_URL }}" >> "$GITHUB_OUTPUT"
          elif [ -n "${{ vars.DOMAIN_NAME }}" ]; then
            echo "api_base=https://dev.api.${{ vars.DOMAIN_NAME }}" >> "$GITHUB_OUTPUT"
          else
            echo "Set GitHub variable DEV_API_BASE_URL"
            exit 1
          fi
          if [ -n "${{ vars.DOMAIN_NAME }}" ]; then
            echo "web_base=https://dev.app.${{ vars.DOMAIN_NAME }}" >> "$GITHUB_OUTPUT"
          elif [ -n "$DISTRIBUTION_ID" ]; then
            WEB_DOMAIN="$(aws cloudfront get-distribution --id "$DISTRIBUTION_ID" --query 'Distribution.DomainName' --output text)"
            echo "web_base=https://$WEB_DOMAIN" >> "$GITHUB_OUTPUT"
          elif [ -n "${{ vars.DEV_WEB_BASE_URL }}" ]; then
            echo "web_base=${{ vars.DEV_WEB_BASE_URL }}" >> "$GITHUB_OUTPUT"
          else
            echo "Set DEV_CLOUDFRONT_DISTRIBUTION_ID or DEV_WEB_BASE_URL"
            exit 1
          fi

      - name: Print smoke test targets
        run: |
          echo "Smoke API URL: ${{ steps.urls.outputs.api_base }}"
          echo "Smoke Web URL: ${{ steps.urls.outputs.web_base }}"

      - name: Smoke test API
        run: curl -f "${{ steps.urls.outputs.api_base }}/health"

      - name: Smoke test web
        run: curl -f "${{ steps.urls.outputs.web_base }}/health"
