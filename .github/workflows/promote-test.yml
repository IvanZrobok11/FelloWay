name: Promote to test

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Docker image tag (git SHA from main build)"
        required: true
        type: string

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ${{ vars.AWS_REGION || 'eu-central-1' }}
  PROJECT_NAME: felloway
  ENVIRONMENT: test

jobs:
  promote:
    runs-on: ubuntu-latest
    environment: test
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ vars.AWS_ACCOUNT_ID }}:role/${{ env.PROJECT_NAME }}-github-deploy-${{ env.ENVIRONMENT }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Copy image dev → test
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ inputs.image_tag }}
        run: |
          docker pull $ECR_REGISTRY/${{ env.PROJECT_NAME }}-api-dev:$IMAGE_TAG
          docker tag $ECR_REGISTRY/${{ env.PROJECT_NAME }}-api-dev:$IMAGE_TAG \
            $ECR_REGISTRY/${{ env.PROJECT_NAME }}-api-test:$IMAGE_TAG
          docker push $ECR_REGISTRY/${{ env.PROJECT_NAME }}-api-test:$IMAGE_TAG
          docker pull $ECR_REGISTRY/${{ env.PROJECT_NAME }}-admin-dev:$IMAGE_TAG
          docker tag $ECR_REGISTRY/${{ env.PROJECT_NAME }}-admin-dev:$IMAGE_TAG \
            $ECR_REGISTRY/${{ env.PROJECT_NAME }}-admin-test:$IMAGE_TAG
          docker push $ECR_REGISTRY/${{ env.PROJECT_NAME }}-admin-test:$IMAGE_TAG

      - name: Deploy ECS test
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ inputs.image_tag }}
        run: |
          chmod +x .github/scripts/ecs-deploy-api-image.sh
          IMAGE_URI="$ECR_REGISTRY/${{ env.PROJECT_NAME }}-api-test:$IMAGE_TAG"
          .github/scripts/ecs-deploy-api-image.sh \
            "${{ env.PROJECT_NAME }}-test" \
            "${{ env.PROJECT_NAME }}-api-test" \
            "${{ env.PROJECT_NAME }}-api-test" \
            "$IMAGE_URI"

      - name: Deploy ECS admin test
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ inputs.image_tag }}
        run: |
          chmod +x .github/scripts/ecs-deploy-admin-image.sh
          ADMIN_IMAGE_URI="$ECR_REGISTRY/${{ env.PROJECT_NAME }}-admin-test:$IMAGE_TAG"
          .github/scripts/ecs-deploy-admin-image.sh \
            "${{ env.PROJECT_NAME }}-test" \
            "${{ env.PROJECT_NAME }}-admin-test" \
            "${{ env.PROJECT_NAME }}-admin-test" \
            "$ADMIN_IMAGE_URI" \
            admin || echo "Admin ECS service not provisioned yet"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      # Stream public key: compile-time only (--dart-define). Do not write env.json to S3.
      - name: Build web (test)
        working-directory: frontend
        env:
          API_BASE_URL: https://test.api.${{ vars.DOMAIN_NAME }}
          STREAM_API_KEY: ${{ vars.TEST_STREAM_API_KEY }}
        run: |
          flutter pub get
          if [ -z "$STREAM_API_KEY" ]; then
            echo "::error::Set GitHub variable TEST_STREAM_API_KEY"
            exit 1
          fi
          if [ "${#STREAM_API_KEY}" -lt 8 ]; then
            echo "::error::TEST_STREAM_API_KEY looks too short (${#STREAM_API_KEY} chars)"
            exit 1
          fi
          printf '%s\n' "window.__FELLOWAY_DEPLOY_ENV__ = 'test';" > web/deploy_env.js
          flutter build web --release \
            --dart-define=API_MODE=live \
            --dart-define=API_BASE_URL="$API_BASE_URL" \
            --dart-define=STREAM_API_KEY="$STREAM_API_KEY"

      - name: Sync web to S3
        env:
          BUCKET: ${{ env.PROJECT_NAME }}-web-test-${{ vars.AWS_ACCOUNT_ID }}
        run: aws s3 sync frontend/build/web/ s3://$BUCKET/ --delete

      - name: Invalidate CloudFront
        env:
          DISTRIBUTION_ID: ${{ vars.TEST_CLOUDFRONT_DISTRIBUTION_ID }}
        run: |
          if [ -n "$DISTRIBUTION_ID" ]; then
            aws cloudfront create-invalidation --distribution-id "$DISTRIBUTION_ID" --paths "/*"
          fi

      - name: Smoke test API
        run: curl -f "https://test.api.${{ vars.DOMAIN_NAME }}/health"
