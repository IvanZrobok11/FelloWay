openapi: 3.0.3
info:
  title: FelloWay API — Reference data
  version: 0.1.0

paths:
  /interests:
    get:
      summary: List professional interests catalog
      responses:
        '200':
          description: Canonical interest options for onboarding and profile
          content:
            application/json:
              schema:
                type: object
                required: [items]
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/InterestCatalogItem'

components:
  schemas:
    InterestCatalogItem:
      type: object
      required: [id, name, sortOrder]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        sortOrder:
          type: integer
