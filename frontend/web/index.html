<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A new Flutter project.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="felloway_client">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>felloway_client</title>
  <link rel="manifest" href="manifest.json">

  <!-- Eruda: dev/test deploys only (see web/deploy_env.js + frontend/README.md) -->
  <script src="deploy_env.js"></script>
  <script>
    (function () {
      var params = new URLSearchParams(location.search);
      if (params.get('eruda') === '0') return;

      var host = location.hostname;
      var env = window.__FELLOWAY_DEPLOY_ENV__;
      if (!env) {
        env =
          host === 'localhost' ||
          host === '127.0.0.1' ||
          host.endsWith('.localhost')
            ? 'dev'
            : 'prod';
      }

      if (env === 'prod' && params.get('eruda') !== '1') return;

      var s = document.createElement('script');
      s.src = 'https://cdn.jsdelivr.net/npm/eruda@3.4.3/eruda.min.js';
      s.onload = function () {
        eruda.init();
      };
      document.head.appendChild(s);
    })();
  </script>
</head>
<body>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
